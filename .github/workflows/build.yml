name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flet & Certifi
        run: |
          pip install flet
          pip install certifi

      - name: Build APK

        run: yes | flet build apk --android-min-sdk 21

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MathMate-APK
          path: build/apk/*.apk
